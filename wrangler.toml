# Cloudflare PAGES only — do not create this repo as a Cloudflare Worker.
# Workers (wrangler deploy) are a different product; use Dashboard → Pages → Create → Pages.
#
# Build: `npx @cloudflare/next-on-pages@1` (runs `next build` then emits the Pages bundle).
# Publish directory must match next-on-pages output (not Next static `out/`).
#
# Manual deploy after a local next-on-pages build:
#   npx wrangler pages deploy .vercel/output/static --project-name=otg-website
#
name = "otg-website"
pages_build_output_dir = ".vercel/output/static"

# Required for @cloudflare/next-on-pages (Node.js APIs in the worker bundle).
# See: https://developers.cloudflare.com/pages/functions/wrangler-configuration/
compatibility_date = "2026-04-13"
compatibility_flags = [ "nodejs_compat" ]
